<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>耳机真伪辨别 · 转转上门回收</title>
<style>
:root {
  --bg: #f2f2f7; --card: #fff; --primary: #007AFF;

  --orange: #FF9500; --orangeBg: #FFF5E6;
  --blueBg: #EBF5FF; --text: #1c1c1e; --text2: #3c3c43; --text3: #8e8e93;

* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding-bottom: 60px; }
.header { position: sticky; top: 0; z-index: 200; background: rgba(255,255,255,.88); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 14px 20px; border-bottom: .5px solid var(--sep); }
.header-inner { max-width: 1000px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 20px; font-weight: 700; }
.container { max-width: 1000px; margin: 0 auto; padding: 16px; }

.nav-layout { display: grid; grid-template-columns: 200px 1fr; gap: 16px; align-items: start; }
@media (max-width: 768px) { .nav-layout { grid-template-columns: 1fr; } }
.sidebar { position: sticky; top: 80px; background: var(--card); border-radius: var(--radius); box-shadow: 0 2px 12px rgba(0,0,0,.06); overflow: hidden; max-height: calc(100vh - 100px); overflow-y: auto; }
.sidebar a { display: block; padding: 10px 16px; font-size: 13px; font-weight: 500; color: var(--text2); text-decoration: none; border-bottom: .5px solid var(--sep); transition: .15s; cursor: pointer; }
.sidebar a:hover, .sidebar a.active { background: var(--blueBg); color: var(--primary); font-weight: 600; }
.sidebar .cat { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; padding: 10px 16px 4px; letter-spacing: .5px; }

.alert { padding: 12px 16px; border-radius: 10px; margin: 8px 0; font-size: 14px; }
.alert-warning { background: var(--orangeBg); border: 1px solid #FFDAAF; }

.section-title { font-size: 20px; font-weight: 800; margin: 4px 0 16px; padding-bottom: 8px; border-bottom: 3px solid var(--primary); display: flex; align-items: center; gap: 8px; scroll-margin-top: 80px; }

.compare-card { background: var(--card); border-radius: var(--radius); margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.06); overflow: hidden; scroll-margin-top: 80px; }
.compare-card .card-title { padding: 14px 18px; font-size: 16px; font-weight: 700; border-bottom: .5px solid var(--sep); display: flex; align-items: center; gap: 8px; }
.compare-body { display: grid; grid-template-columns: 1fr 1fr; }
@media (max-width: 500px) { .compare-body { grid-template-columns: 1fr; } }
.compare-col { padding: 12px 16px; }
.compare-col.genuine { background: var(--greenBg); border-right: .5px solid var(--sep); }
.compare-col.fake { background: var(--redBg); }
.compare-col h4 { font-size: 14px; margin-bottom: 6px; }
.compare-col ul { list-style: none; font-size: 13px; line-height: 1.5; }
.compare-col ul li { padding: 4px 0; }

.img-stack { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.img-stack .img-wrap { width: calc(50% - 3px); max-width: 200px; }
.img-stack .img-wrap img { width: 100%; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: .2s; object-fit: cover; aspect-ratio: 1; }
.img-stack .img-wrap img:hover { border-color: var(--primary); transform: scale(1.02); }
@media (max-width: 500px) { .img-stack .img-wrap { width: calc(50% - 3px); max-width: 150px; } }

.img-label { font-size: 10px; color: var(--text3); text-align: center; margin-top: 2px; }

.broken-img { width: 100%; aspect-ratio: 1; border-radius: 8px; background: #f0f0f5; display: none; align-items: center; justify-content: center; flex-direction: column; color: #c7c7cc; font-size: 11px; gap: 4px; }
.broken-img.show { display: flex; }
.broken-img span { font-size: 24px; }

.lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.92); z-index: 9999; justify-content: center; align-items: center; cursor: pointer; }
.lightbox.show { display: flex; }
.lightbox img { max-width: 95%; max-height: 90vh; border-radius: 8px; }
.lightbox .close-btn { position: fixed; top: 16px; right: 20px; color: #fff; font-size: 32px; cursor: pointer; z-index: 10000; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }

.checklist { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
.checklist h3 { font-size: 15px; margin-bottom: 8px; }
.check-grid { display: flex; flex-wrap: wrap; gap: 5px; }
.check-item { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; background: #f5f5f7; }

.tag { display: inline-block; padding: 2px 7px; border-radius: 5px; font-size: 11px; font-weight: 600; }
.tag-red { background: var(--redBg); color: #C62828; }
.tag-green { background: var(--greenBg); color: #1B5E20; }

.search-box { margin-bottom: 14px; }
.search-box input { width: 100%; padding: 10px 16px; border-radius: 10px; border: 1px solid var(--sep); font-size: 14px; background: var(--card); outline: none; }
.search-box input:focus { border-color: var(--primary); }
</style>
</head>

      e.stopPropagation();

    });
    // Error handling - done via event listener, not inline attribute
    img.addEventListener('error', function() {
      this.style.display = 'none';
      var broken = this.parentElement.querySelector('.broken-img');
      if (broken) broken.classList.add('show');

// Lightbox functions (global scope)
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('show');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLightbox(); });

// Search
function filterCards() {
  var q = document.getElementById('searchBox').value.toLowerCase();
  document.querySelectorAll('.compare-card, .section-title').forEach(function(el) {
    if (!q) { el.style.display = ''; return; }
    if (el.classList.contains('section-title')) {
      var vis = false;
      var sibling = el.nextElementSibling;
      while (sibling && sibling.classList.contains('compare-card')) {
        if (sibling.textContent.toLowerCase().indexOf(q) !== -1) vis = true;
        sibling = sibling.nextElementSibling;
      }
      el.style.display = vis ? '' : 'none';
    } else if (el.classList.contains('compare-card')) {
      el.style.display = el.textContent.toLowerCase().indexOf(q) !== -1 ? '' : 'none';
    }
  });
}

// Scroll spy
window.addEventListener('scroll', function() {
  var links = document.querySelectorAll('.sidebar a');
  var current = '';
  document.querySelectorAll('.compare-card').forEach(function(card) {
    if (card.getBoundingClientRect().top < 200) current = card.id;
  });
  links.forEach(function(a) { a.classList.remove('active'); });
  if (current) {
    links.forEach(function(a) {
      if (a.getAttribute('data-target') === current) a.classList.add('active');
    });
  }
});
</script>
